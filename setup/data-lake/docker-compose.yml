services:
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: minio
    hostname: minio
    restart: unless-stopped
    volumes:
      - minio-data:/data
    ports:
      - ${MINIO_API}:9000
      - ${MINIO_UI}:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - airflow-untitled-project-net

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing myminio/${LOGS_BUCKET};
      /usr/bin/mc mb --ignore-existing myminio/${OPNWEATHER_BUCKET};
      /usr/bin/mc anonymous set download myminio/${LOGS_BUCKET};
      /usr/bin/mc anonymous set download myminio/${OPNWEATHER_BUCKET};
      exit 0;
      "
    networks:
      - airflow-untitled-project-net

networks:
  airflow-untitled-project-net:
    external: True

volumes:
  minio-data:
    driver: local
    name: minio-data